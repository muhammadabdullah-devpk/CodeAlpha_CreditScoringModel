{% extends "base.html" %}
{% block title %}404 Not Found{% endblock %}

{% block content %}
<div class="container-xl d-flex flex-column align-items-center justify-content-center min-vh-75 text-center animate-fade-up">
    <div class="text-danger mb-4">
        <i class="fa-solid fa-triangle-exclamation fa-5x animate-pulse"></i>
    </div>
    <h1 class="display-3 fw-bold text-light mb-2">404</h1>
    <h4 class="mb-3 text-secondary">Route Mapping Missing</h4>
    <p class="text-muted max-w-350 mb-4">The route you requested does not map to any endpoint. Ensure you entered the URL correctly or return to the main dashboard.</p>
    <a href="{{ url_for('home') }}" class="btn btn-gradient px-4">
        <i class="fa-solid fa-house me-1"></i> Return Dashboard
    </a>
</div>
{% endblock %}
